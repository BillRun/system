version: '3.7'

services:
    web:
        image: nginx:latest
        container_name: billrun-nginx
        ports:
            - "8074:80"
        restart: always
        volumes:
            - ./../..:/billrun:ro
            - ./nginx.conf:/etc/nginx/nginx.conf
        depends_on:
            - "php"
            - "mongodb"
        environment:
        - "APPLICATION_ENV=container"    
    php:
        build: 
            context: ./billrun-php85
            dockerfile: Dockerfile
        image: billrun-php85
        container_name: billrun-app
        restart: always
        environment:
        - "APPLICATION_ENV=container"
        - "XDEBUG_CONFIG=client_host=10.103.0.1 client_port=9090 mode=develop"
        volumes:
            - ./../..:/billrun
        command: sh -c "cp -r /var/www/html/vendor/* /billrun/vendor/&& php-fpm "
    mongodb:
        image: mongo:8.0
        container_name: billrun-mongodb
        restart: always
        volumes:
            - ./../..:/billrun:ro
            - ./init-mongosh.sh:/docker-entrypoint-initdb.d/init-mongosh.sh
        ports:
            - 27017:27017
    chrome:
        image: selenium/standalone-chrome
        container_name: billrun-standalone-chrome
        restart: always
    mockup:
        #image: php:7.3-fpm
        build:
            context: ./mockup-servers
            dockerfile: Dockerfile-webserver
        container_name: billrun-mockups
        environment:
        - "XDEBUG_CONFIG=client_host=10.103.0.1 client_port=9090 discover_client_host=false mode=develop"
        volumes:
            - ${PWD}/mockup-servers:/mockups
            - ${PLUGIN_PATH:-/dev/null}:/plugin
        command: php -S 0.0.0.0:8081 router.php
        ports:
        - 8081:8081
        restart: always
        networks:
            default:
                ipv4_address: 10.103.0.10


networks:
  default:
    driver: bridge
    ipam:
      driver: default
      config:
      - subnet:  10.103.0.0/16
