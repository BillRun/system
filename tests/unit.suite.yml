# Codeception Test Suite Configuration
#
# Suite for unit or integration tests.

actor: UnitTester
bootstrap: ../_support/Helper/BillRun/bootstrap.php
error_level: E_ALL & ~E_WARNING & ~E_NOTICE
modules:
    enabled:
 #       - Asserts
 #       - \Helper\Unit
         - \Helper\BillRun\Mockups\PaymentGateway
         - \Helper\Aggregate
         - MongoDb:
              dsn: "mongodb://mongodb:27017/billing_container"
              user: ""
              password: ""
#              dump_type: "mongodump-tar-gz"
#              dump: "tests/_data/db_test_dump.tar.gz"
              populate: false
              cleanup: false
         - REST:
              url: http://web
              depends: PhpBrowser
              part: Json

    extends: _support/Helper/BillRun.php 
    step_decorators: ~        
