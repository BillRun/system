actor: ApiTester
bootstrap: ../_support/Helper/BillRun/bootstrap.php
modules:
    enabled:
        - Asserts
        - \Helper\Api
        - \Helper\BillRunAPI
        - \Helper\TestHelper
        - \Helper\LogChecker
        - REST:
            depends: PhpBrowser
            part: Json
        - MongoDb:
              dsn: "mongodb://mongodb:27017/billing_container"
              user: ""
              password: ""
#              dump_type: "mongodump-tar-gz"
#              dump: "tests/_data/db_test_dump.tar.gz"
              populate: false
              cleanup: false
    config:
        PhpBrowser:
            url: http://web
            curl:
                CURLOPT_TIMEOUT: 180
