# You can override the included template(s) by including variable overrides
# SAST customization: https://docs.gitlab.com/ee/user/application_security/sast/#customizing-the-sast-settings
# Secret Detection customization: https://docs.gitlab.com/user/application_security/secret_detection/pipeline/configure
# Dependency Scanning customization: https://docs.gitlab.com/ee/user/application_security/dependency_scanning/#customizing-the-dependency-scanning-settings
# Container Scanning customization: https://docs.gitlab.com/ee/user/application_security/container_scanning/#customizing-the-container-scanning-settings
# Note that environment variables can be set in several places
# See https://docs.gitlab.com/ee/ci/variables/#cicd-variable-precedence
image: docker
stages:
  - build
  - test
  - security

variables:
  GIT_STRATEGY: clone
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: "-ffdx -e .cache"
  DS_ENFORCE_NEW_ANALYZER: "true"
  DS_INCLUDE_DEV_DEPENDENCIES: "false"
  DS_MAX_DEPTH: -1
  CS_IMAGE: billrun/billrun:$CI_COMMIT_TAG
  GITLAB_ADVANCED_SAST_ENABLED: "false"
  SAST_EXCLUDED_PATHS: "vendor/,tests/,public/vendors/,public/js/vendor/,library/stripe-php/,.git/,docker/,.idea/,conf/utest/,*.min.js,*.min.css,*.map,*.lock,*.log"
  SAST_DISABLE_REMOTE_CHECKS: "false"

print-info:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_LABELS == "skip_ci"
  when: manual
  script:
    - 'echo "Job start: $CI_JOB_STARTED_AT"'
    - 'echo "Branch: $CI_COMMIT_BRANCH"'
    - 'echo "Commit Author: $CI_COMMIT_AUTHOR"'

codecept:
  services:
    - name: docker:dind
      alias: dockerhost
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    DOCKER_HOST: tcp://dockerhost:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  stage: test
  tags:
    - new_docker_runner
  before_script:
    # build and run BillRun app in docker
    - mkdir logs cache
    - chmod 777 logs/ cache/
    - cp $TEST_ENV_CODECEPT $CI_PROJECT_DIR/tests/.env
    - cd $CI_PROJECT_DIR/docker/billrun-docker
    - docker-compose -f docker-compose-php85-tests.yml up --wait --build --detach
  script:
    - cd $CI_PROJECT_DIR/docker/billrun-docker/
    - docker exec -w /billrun billrun-app php vendor/bin/codecept build
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run unit
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run functional
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run api
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run acceptance
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run all
    - cd $CI_PROJECT_DIR/docker/billrun-docker
    - docker-compose -f docker-compose-php85-tests.yml down --remove-orphans
  after_script:
    - if [ "$CI_JOB_STATUS" = "success" ]; then exit 0; fi
    - cd $CI_PROJECT_DIR/docker/billrun-docker
    - docker-compose -f docker-compose-php85-tests.yml ps
    - docker logs billrun-app
  artifacts:
    when: on_failure
    paths:
      - $CI_PROJECT_DIR/logs/container/debug.log
      - $CI_PROJECT_DIR/tests/_output/*
    expire_in: 1 week

