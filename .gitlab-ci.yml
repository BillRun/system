image: docker
stages:
  - build
  - test
  - security

variables:
  GIT_STRATEGY: clone
  GIT_CHECKOUT: "true"
  GIT_CLEAN_FLAGS: "-ffdx -e .cache"
  DS_ENFORCE_NEW_ANALYZER: "true"
  DS_INCLUDE_DEV_DEPENDENCIES: "false"
  DS_MAX_DEPTH: -1
  CS_IMAGE: billrun/billrun:$CI_COMMIT_TAG
  GITLAB_ADVANCED_SAST_ENABLED: "false"
  SAST_EXCLUDED_PATHS: "vendor/,tests/,public/vendors/,public/js/vendor/,library/stripe-php/,.git/,docker/,.idea/,conf/utest/,*.min.js,*.min.css,*.map,*.lock,*.log"
  SAST_DISABLE_REMOTE_CHECKS: "false"

print-info:
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_LABELS == "skip_ci"
  when: manual
  script:
    - 'echo "Job start: $CI_JOB_STARTED_AT"'
    - 'echo "Branch: $CI_COMMIT_BRANCH"'
    - 'echo "Commit Author: $CI_COMMIT_AUTHOR"'
codecept:
  services:
    - name: docker:dind
      alias: dockerhost
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
  variables:
    DOCKER_HOST: tcp://dockerhost:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  stage: test
  tags:
    - new_docker_runner
  # rules:
  #   - if: $CI_PIPELINE_SOURCE == "merge_request_event" && $CI_MERGE_REQUEST_LABELS != "skip_ci"
  before_script:
    # build and run BillRun app in docker
    - mkdir logs cache
    - chmod 777 logs/ cache/
    - cp $TEST_ENV_CODECEPT $CI_PROJECT_DIR/tests/.env
    - cd $CI_PROJECT_DIR/docker/billrun-docker
    - docker-compose -f docker-compose-php74-tests.yml up --wait --build --detach
  script:
    - cd $CI_PROJECT_DIR/docker/billrun-docker/
    - docker exec -w /billrun billrun-app php vendor/bin/codecept build
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run unit
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run functional
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run api
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run acceptance
    - docker exec -w /billrun billrun-app php vendor/bin/codecept run all
    - cd $CI_PROJECT_DIR/docker/billrun-docker
    - docker-compose -f docker-compose-php74-tests.yml down --remove-orphans
  artifacts:
    when: on_failure
    paths:
      - $CI_PROJECT_DIR/logs/container/debug.log
      - $CI_PROJECT_DIR/tests/_output/*
    expire_in: 1 week

build:
  stage: build
  image: docker:20.10.16
  services:
    - docker:dind
  script:
    - echo "Building Docker image from Tag $CI_COMMIT_TAG"
    - docker build -t billrun/billrun:$CI_COMMIT_TAG -f docker/cicd/Dockerfile  .
    - docker images
  rules:
    - if: '$CI_COMMIT_TAG =~ /^5\.\d+\.\d+(-(beta|rc)\d+(\.\d+)?)?$/'

push:
  stage: build
  image: docker:20.10.16
  services:
    - docker:dind
  script:
    - docker images
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD
    - docker push billrun/billrun:$CI_COMMIT_TAG
    - docker rmi -f billrun/billrun:$CI_COMMIT_TAG
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^5\.\d+\.\d+(-(beta|rc)\d+(\.\d+)?)?$/'

container_scanning:
  stage: security
  needs:
    - build
  rules:
    - if: '$CI_COMMIT_TAG =~ /^5\.\d+\.\d+(-(beta|rc)\d+(\.\d+)?)?$/'

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/Container-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml
