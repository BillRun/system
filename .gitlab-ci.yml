build:
  stage: build
  tags: [new_docker_runner]
  image: docker:24
  services:
    - name: docker:24-dind
      alias: dockerhost
  variables:
    DOCKER_HOST: tcp://dockerhost:2375/
    DOCKER_DRIVER: overlay2
    DOCKER_TLS_CERTDIR: ""
  script:
    - echo "Building Docker image from Tag $CI_COMMIT_TAG"
    - echo "$CI_REGISTRY_PASSWORD" | docker login -u "$CI_REGISTRY_USER" --password-stdin
    - |
      # Move :latest only when this tag is the highest stable tag in the repo
      # AND its major version is >= 5. A "stable" tag is exactly
      # MAJOR.MINOR.PATCH - any suffix (-rc, -alpha, -beta, -dev, etc.)
      # disqualifies the tag from being :latest. Backports on older release
      # lines (e.g. 5.24.5 published after 6.0.0 already exists) also leave
      # :latest alone. Legacy tags (4.x and below) are not pushed at all.
      LATEST_TAG=""
      if echo "$CI_COMMIT_TAG" | grep -qE '^([5-9]|[1-9][0-9]+)\.[0-9]+\.[0-9]+$'; then
        HIGHEST=$(git ls-remote --tags --refs origin 2>/dev/null \
          | awk '{print $2}' \
          | sed 's|refs/tags/||' \
          | grep -E '^([5-9]|[1-9][0-9]+)\.[0-9]+\.[0-9]+$' \
          | sort -V \
          | tail -1)
        if [ "$CI_COMMIT_TAG" = "$HIGHEST" ]; then
          LATEST_TAG="--tag billrun/billrun:latest"
        else
          echo "Not moving :latest - current tag $CI_COMMIT_TAG is not the highest stable ($HIGHEST)"
        fi
      fi
      docker buildx build --tag billrun/billrun:$CI_COMMIT_TAG $LATEST_TAG --push --no-cache -f docker/cicd/Dockerfile .
  rules:
    - if: '$CI_COMMIT_TAG =~ /^([5-9]|[1-9]\d+)\.\d+\.\d+(-(beta|rc)\d+(\.\d+)?)?$/'

container_scanning:
  tags: [CI_SAST]
  stage: security
  needs:
    - build
  variables:
    CS_REGISTRY_USER: $CI_REGISTRY_USER
    CS_REGISTRY_PASSWORD: $CI_REGISTRY_PASSWORD
    CS_DOCKERFILE_PATH: docker/cicd/Dockerfile
    GIT_STRATEGY: clone
    CS_SEVERITY_THRESHOLD: HIGH
  rules:
    - if: '$CI_COMMIT_TAG =~ /^([5-9]|[1-9]\d+)\.\d+\.\d+(-(beta|rc)\d+(\.\d+)?)?$/'

include:
  - template: Jobs/Secret-Detection.gitlab-ci.yml
  - template: Jobs/Dependency-Scanning.latest.gitlab-ci.yml
  - template: Jobs/Container-Scanning.latest.gitlab-ci.yml
  - template: Jobs/SAST.latest.gitlab-ci.yml

secret_detection:
  tags: [CI_SAST]
  variables:
    GIT_STRATEGY: clone

dependency-scanning:
  tags: [CI_SAST]

semgrep-sast:
  tags: [CI_SAST]