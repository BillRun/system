openapi: 3.1.0
info:
  title: BillRun REST API
  version: '6.0'
  summary: Open-source billing & rating platform - REST API reference.
  description: |
    BillRun exposes three families of HTTP endpoints:

    - `/billapi/{collection}/{action}` - the modern entity API (CRUD + lifecycle
      actions on accounts, subscribers, plans, services, rates, balances, bills,
      discounts, charges, taxes, users, reports, etc).
    - `/api/{action}` - the legacy action API used for one-off operations such as
      credit, payment, refunds, reports, subscribers lookup, and admin tasks.
    - `/realtime` - the realtime rating/charging endpoint used by network
      elements (OCS-style start / update / release events).

    Authentication is one of:

    - Session cookie obtained via `POST /auth/login`.
    - OAuth2 access token issued by `POST /oauth2/token`.
    - Per-request signature using a shared secret (the `signature` parameter)
      for machine-to-machine integrations.

    See [docs.bill.run](https://docs.bill.run/en/api/security) for the
    authoritative behavior documentation; this OpenAPI document mirrors that
    interface.
  contact:
    name: BillRun
    url: https://bill.run
    email: cloud_support@billrun.com
  license:
    name: AGPL-3.0
    url: https://www.gnu.org/licenses/agpl-3.0.html
  termsOfService: https://bill.run/terms
servers:
  - url: https://{host}
    description: Self-hosted BillRun instance
    variables:
      host:
        default: billing.example.com
        description: Hostname of your BillRun deployment
security:
  - sessionCookie: []
  - oauth2:
      - read
      - write
      - admin
  - secretSignature: []
tags:
  - name: Auth
    description: Login, logout, available authentication protocols.
  - name: OAuth2
    description: OAuth2 token endpoint.
  - name: BillAPI
    description: |
      Modern entity API at `/billapi/{collection}/{action}`. The same set of
      actions (get, uniqueget, create, update, close, closeandnew, reopen,
      delete, move, permanentchange, import, export) is applied to a range of
      collections (accounts, subscribers, plans, services, rates, balances,
      bills, charges, discounts, prepaidincludes, prepaidgroups, taxes,
      reports, users, etc).
  - name: Credit
    description: Credit lines (one-off charges or refunds).
  - name: Payment
    description: Payments, bills, payment methods, adjustments.
  - name: Realtime
    description: Realtime charging events (start / update / release).
  - name: Reports
    description: Run/list/export reports.
  - name: Outgoing
    description: |
      Endpoints that **BillRun calls on a 3rd-party CRM** when running in
      external-subscribers mode (accounts and subscribers are stored in the CRM,
      not in BillRun). Implement these on the CRM side.
paths:
  /auth/login:
    post:
      tags:
        - Auth
      summary: Log in and obtain a session cookie
      description: |
        Authenticate with one of the configured providers and receive a
        `PHPSESSID` cookie. The cookie must be sent on subsequent requests.

        The available providers are returned by `GET /auth/options`. The
        `protocol` field selects which provider to use (defaults to
        `internal`). For `internal`, the username/password pair is checked
        against the BillRun users collection.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                protocol:
                  type: string
                  default: internal
                  example: internal
                  description: Authentication protocol (`internal`, `ldap`, `saml`, etc.).
                username:
                  type: string
                  example: admin
                password:
                  type: string
                  format: password
                remember:
                  type: boolean
                  description: Persist the session beyond the browser tab.
              required:
                - username
                - password
      responses:
        '200':
          description: Authentication result
          headers:
            Set-Cookie:
              schema:
                type: string
              description: PHPSESSID session cookie.
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 0
                      - 1
                  desc:
                    type: string
                  details:
                    type: object
                    properties:
                      user:
                        type: object
                        additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /auth/logout:
    post:
      tags:
        - Auth
      summary: Log out and destroy the session
      description: Terminates the session associated with the request cookie.
      responses:
        '200':
          $ref: '#/components/responses/Envelope'
  /auth/options:
    get:
      tags:
        - Auth
      summary: List supported authentication protocols
      description: |
        Returns the configured authentication providers, derived from
        `auth.protocols` and `auth.<protocol>` config keys. Use this to render
        a "Sign in with..." picker.
      security: []
      responses:
        '200':
          description: Available providers
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 1
                  desc:
                    type: string
                  details:
                    type: object
                    properties:
                      protocols:
                        type: array
                        items:
                          type: object
                          properties:
                            type:
                              type: string
                              example: internal
                            label:
                              type: string
                              example: Username / Password
                            name:
                              type: string
                              example: internal_default
  /oauth2/token:
    post:
      tags:
        - OAuth2
      summary: Issue an OAuth2 access token
      description: |
        OAuth2 token endpoint. Supports the `client_credentials`,
        `password`, and `refresh_token` grants depending on what the
        BillRun OAuth2 server is configured for.

        The returned `access_token` should be sent on subsequent calls as
        `Authorization: Bearer <token>`.
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - grant_type
                - client_id
                - client_secret
              properties:
                grant_type:
                  type: string
                  enum:
                    - client_credentials
                    - password
                    - refresh_token
                client_id:
                  type: string
                client_secret:
                  type: string
                  format: password
                scope:
                  type: string
                  description: Space-separated list of requested scopes.
                  example: read write
                username:
                  type: string
                  description: Required for the `password` grant.
                password:
                  type: string
                  format: password
                  description: Required for the `password` grant.
                refresh_token:
                  type: string
                  description: Required for the `refresh_token` grant.
      responses:
        '200':
          description: Access token issued
          content:
            application/json:
              schema:
                type: object
                properties:
                  access_token:
                    type: string
                  token_type:
                    type: string
                    example: Bearer
                  expires_in:
                    type: integer
                    example: 3600
                  scope:
                    type: string
                  refresh_token:
                    type: string
        '400':
          description: Invalid request
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                    example: invalid_grant
                  error_description:
                    type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
  /billapi/{collection}/{action}:
    post:
      tags:
        - BillAPI
      summary: Generic entity API
      operationId: billapi.generic
      description: |
        Generic shape of every BillAPI endpoint. See the per-collection paths
        below for the parameter list applicable to a given collection/action
        combination.

        ### Request shape

        Parameters can be sent either as `application/x-www-form-urlencoded`
        or `application/json`. The two most common are:

        - `query` - a JSON-encoded MongoDB-style filter, used by read actions
          (`get`, `uniqueget`) and by mutating actions that target a specific
          revision (`update`, `close`, `closeandnew`, `delete`, ...).
        - `update` - a JSON-encoded entity payload, used by all mutating
          actions.

        ### Response shape

        All responses use the standard envelope - see
        [Envelope](#components/schemas/Envelope).
      parameters:
        - $ref: '#/components/parameters/Collection'
        - $ref: '#/components/parameters/Action'
        - $ref: '#/components/parameters/Query'
        - $ref: '#/components/parameters/Update'
        - $ref: '#/components/parameters/Page'
        - $ref: '#/components/parameters/Size'
        - $ref: '#/components/parameters/Sort'
        - $ref: '#/components/parameters/Project'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                query:
                  type: string
                  description: JSON-encoded filter
                update:
                  type: string
                  description: JSON-encoded entity payload
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Envelope'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
  /billapi/accounts/{action}:
    post:
      tags:
        - BillAPI
      summary: Accounts collection
      operationId: billapi.accounts
      description: |
        Customer accounts. Backed by the `subscribers` MongoDB collection
        with `type=account`.

        Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
        `closeandnew`, `reopen`, `delete`, `permanentchange`, `import`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - permanentchange
              - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  description: Filter for reads / targeted writes.
                  properties:
                    _id:
                      type: string
                      description: Mongo ObjectId
                    aid:
                      type: integer
                      description: Account ID
                    firstname:
                      type: string
                    lastname:
                      type: string
                    company_name:
                      type: string
                    contact_name:
                      type: string
                    phone:
                      type: string
                    creation_time:
                      type: string
                      format: date-time
                  additionalProperties: true
                update:
                  $ref: '#/components/schemas/AccountUpdate'
      responses:
        '200':
          description: Accounts result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        oneOf:
                          - type: array
                            items:
                              $ref: '#/components/schemas/Account'
                          - type: object
                            additionalProperties: true
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
  /billapi/subscribers/{action}:
    post:
      tags:
        - BillAPI
      summary: Subscribers collection
      operationId: billapi.subscribers
      description: |
        Subscribers belong to an account (linked by `aid`). Identified by
        `sid` (auto-incremented).

        Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
        `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`,
        `import`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
              - permanentchange
              - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  properties:
                    _id:
                      type: string
                    sid:
                      type: integer
                    aid:
                      type: integer
                    services.from:
                      type: string
                      format: date-time
                    services.to:
                      type: string
                      format: date-time
                    services.name:
                      type: array
                      items:
                        type: string
                    creation_time:
                      type: string
                      format: date-time
                  additionalProperties: true
                update:
                  $ref: '#/components/schemas/SubscriberUpdate'
      responses:
        '200':
          description: Subscribers result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        oneOf:
                          - type: array
                            items:
                              $ref: '#/components/schemas/Subscriber'
                          - type: object
                            additionalProperties: true
  /billapi/plans/{action}:
    post:
      tags:
        - BillAPI
      summary: Plans collection
      operationId: billapi.plans
      description: |
        Billing plans (a.k.a. "rate plans"). Plans bundle recurring charges,
        inclusive units, and rate overrides.

        Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
        `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
              - permanentchange
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  properties:
                    _id:
                      type: string
                    name:
                      type: string
                    to:
                      type: string
                      format: date-time
                  additionalProperties: true
                update:
                  $ref: '#/components/schemas/PlanUpdate'
      responses:
        '200':
          description: Plans result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Plan'
  /billapi/services/{action}:
    post:
      tags:
        - BillAPI
      summary: Services collection
      operationId: billapi.services
      description: |
        Services are reusable bundles that can be attached to subscribers or
        accounts (e.g. "VOIP Add-on", "Roaming Pack").

        Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
        `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
              - permanentchange
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  additionalProperties: true
                update:
                  $ref: '#/components/schemas/ServiceUpdate'
      responses:
        '200':
          description: Services result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Service'
  /billapi/rates/{action}:
    post:
      tags:
        - BillAPI
      summary: Rates / products collection
      operationId: billapi.rates
      description: |
        Rates (called "Products" in the UI) define how usage is priced.
        Identified by `key`.

        Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
        `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
              - permanentchange
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  properties:
                    _id:
                      type: string
                    key:
                      type: string
                  additionalProperties: true
                update:
                  $ref: '#/components/schemas/RateUpdate'
      responses:
        '200':
          description: Rates result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Rate'
  /billapi/balances/{action}:
    post:
      tags:
        - BillAPI
      summary: Balances collection
      operationId: billapi.balances
      description: |
        Monthly / cycle balance buckets per subscriber. Tracks inclusive
        units consumed and over-usage charges.

        Supported actions: `get`, `uniqueget`, `update`, `delete`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - update
              - delete
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  properties:
                    _id:
                      type: string
                    sid:
                      type: integer
                    aid:
                      type: integer
                    billrun:
                      type: string
                      description: Billing cycle key (YYYYMM)
                  additionalProperties: true
                update:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Balances result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Balance'
  /billapi/bills/{action}:
    post:
      tags:
        - BillAPI
      summary: Bills collection
      operationId: billapi.bills
      description: |
        Bill documents - covers both invoices (`type=inv`) and payment
        receipts/refunds (`type=rec`, `type=ref`).

        Supported actions: `get`, `uniqueget`, `update`, `delete`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - update
              - delete
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                query:
                  type: object
                  properties:
                    _id:
                      type: string
                    aid:
                      type: integer
                    type:
                      type: string
                      enum:
                        - inv
                        - rec
                        - ref
                    invoice_id:
                      type: integer
                    due:
                      type: string
                      format: date-time
                    billrun_key:
                      type: string
                  additionalProperties: true
                update:
                  type: object
                  additionalProperties: true
      responses:
        '200':
          description: Bills result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Bill'
  /billapi/charges/{action}:
    post:
      tags:
        - BillAPI
      summary: Charges collection
      operationId: billapi.charges
      description: |
        One-off or recurring charge definitions (e.g. activation fees,
        late-payment fees).
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Charges result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Charge'
  /billapi/discounts/{action}:
    post:
      tags:
        - BillAPI
      summary: Discounts collection
      operationId: billapi.discounts
      description: |
        Discount definitions. Can apply to plans, services, rates, or
        arbitrary subscriber attributes.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
              - permanentchange
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Discounts result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Discount'
  /billapi/prepaidincludes/{action}:
    post:
      tags:
        - BillAPI
      summary: Prepaid includes (inclusive unit pools)
      operationId: billapi.prepaidincludes
      description: |
        Definitions of inclusive-unit pools used by plans and services
        (minutes, MB, SMS).
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Prepaid includes result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/PrepaidInclude'
  /billapi/prepaidgroups/{action}:
    post:
      tags:
        - BillAPI
      summary: Prepaid groups
      operationId: billapi.prepaidgroups
      description: Grouping of prepaid includes for shared consumption.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Envelope'
  /billapi/taxes/{action}:
    post:
      tags:
        - BillAPI
      summary: Taxes collection
      operationId: billapi.taxes
      description: |
        Tax rate definitions. Linked from plans, services and rates via the
        `tax` array.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - closeandnew
              - reopen
              - delete
              - move
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Taxes result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Tax'
  /billapi/reports/{action}:
    post:
      tags:
        - BillAPI
        - Reports
      summary: Reports collection (definitions)
      operationId: billapi.reports
      description: |
        CRUD on saved report definitions. To **run** a report, see
        `POST /api/report`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - delete
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Reports result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Report'
  /billapi/users/{action}:
    post:
      tags:
        - BillAPI
      summary: Users collection (admin/operator users)
      operationId: billapi.users
      description: |
        Operator user accounts used to log in to BillRun. Subscribers (end
        customers) live in the `subscribers` collection - see
        `/billapi/subscribers/`.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - delete
              - changepassword
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Users result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/User'
  /billapi/lines/{action}:
    post:
      tags:
        - BillAPI
      summary: Lines (usage events / CDRs)
      operationId: billapi.lines
      description: |
        Raw usage records (a.k.a. "lines" or "CDRs"). Read-only via BillAPI;
        mutating actions are normally driven by the calculator/aggregator
        pipeline.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          description: Lines result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Line'
  /billapi/autorenew/{action}:
    post:
      tags:
        - BillAPI
      summary: Autorenew rules
      operationId: billapi.autorenew
      description: |
        Auto-renewal subscriptions that automatically re-charge a balance
        or top-up at a defined interval.
      parameters:
        - name: action
          in: path
          required: true
          schema:
            type: string
            enum:
              - get
              - uniqueget
              - create
              - update
              - close
              - delete
      requestBody:
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
      responses:
        '200':
          $ref: '#/components/responses/Envelope'
  /api/credit:
    post:
      tags:
        - Credit
      summary: Credit a subscriber / account
      operationId: api.credit
      description: |
        Create a credit line for a subscriber or account. Used both for
        ad-hoc charges (positive `aprice`) and refunds (negative `aprice`).

        The credit is recorded immediately as a `lines` record with
        `type=credit` and goes into the next billing cycle (or the cycle
        specified by `billrun_key`). For multi-installment credits, set
        `installments` to a positive integer.

        Implemented by `Action_CreditAction::execute()`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                action:
                  type: string
                  enum:
                    - prepone
                  description: |
                    Optional sub-action. `prepone` brings forward all future
                    installments for the given `aid`/`sid`. When omitted the
                    endpoint creates a fresh credit line.
                aid:
                  type: integer
                  description: Account ID
                sid:
                  type: integer
                  description: Subscriber ID
                aprice:
                  type: number
                  description: |
                    Charge amount. Positive = debit the customer, negative =
                    refund / credit.
                usagev:
                  type: number
                  description: Usage volume credited (where applicable).
                usaget:
                  type: string
                  description: Usage type (e.g. `call`, `sms`, `data`, `flat`).
                arate:
                  type: string
                  description: Product / rate `key` to associate this credit with.
                arategroup:
                  type: string
                  description: Optional rate group.
                billrun_key:
                  type: string
                  description: Target billing cycle (`YYYYMM`). Defaults to the next open cycle.
                installments:
                  type: integer
                  minimum: 1
                  description: Split the credit into N installments.
                reason:
                  type: string
                  description: Free-text justification.
                suggestion_stamp:
                  type: string
                  description: |
                    When set, the credit is created from a pre-approved
                    suggestion (see the `suggestions` collection). Multiple
                    credit lines are written from one call - the response
                    status will be `2` if some sub-requests fail.
              required:
                - aid
                - aprice
      responses:
        '200':
          description: Credit recorded
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Line'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/bulkcredit:
    post:
      tags:
        - Credit
      summary: Credit multiple subscribers in a single call
      operationId: api.bulkcredit
      description: |
        Batch version of `/api/credit`. Accepts an array of credit requests
        and processes each independently - one failure does not roll the
        others back. The response status is `1` if all succeeded, `2` if
        partial, `0` if all failed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - credits
              properties:
                credits:
                  type: array
                  items:
                    type: object
                    properties:
                      aid:
                        type: integer
                      sid:
                        type: integer
                      aprice:
                        type: number
                      usagev:
                        type: number
                      usaget:
                        type: string
                      arate:
                        type: string
                      billrun_key:
                        type: string
                      reason:
                        type: string
                    required:
                      - aid
                      - aprice
      responses:
        '200':
          description: Bulk credit result (one envelope per input row)
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          type: object
                          properties:
                            input:
                              type: object
                              additionalProperties: true
                            status:
                              type: integer
                              enum:
                                - 0
                                - 1
                            error:
                              type: string
                            line:
                              $ref: '#/components/schemas/Line'
  /api/pay:
    post:
      tags:
        - Payment
      summary: Pay / refund / deposit / split bill
      operationId: api.pay
      description: |
        Multi-purpose payment endpoint. The `action` parameter selects the
        sub-operation; when omitted, the call processes one or more
        payments via the configured gateway.

        Implemented by `Action_PayAction::execute()`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                method:
                  type: string
                  description: |
                    Payment method. One of the registered Bill_Payment
                    subclasses (`credit`, `cash`, `cheque`, `direct_debit`,
                    `installment_agreement`, ...).
                action:
                  type: string
                  enum:
                    - split_bill
                    - use_deposit
                    - cancel_payments
                    - merge_installments
                  description: |
                    Sub-action. When set:
                      - `split_bill`: split a bill into installments
                      - `use_deposit`: unfreeze a previously frozen deposit
                      - `cancel_payments`: cancel queued/processing payments
                      - `merge_installments`: combine installments back together
                payments:
                  type: string
                  description: |
                    JSON-encoded array of payment objects. Required when
                    `action` is empty.
                txid:
                  type: string
                  description: |
                    JSON-encoded array of transaction IDs. Required for
                    `use_deposit` and `cancel_payments`.
                uf:
                  type: string
                  description: |
                    JSON-encoded user fields to attach to the payment(s).
              required: []
      responses:
        '200':
          description: Payment processed
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: object
                        properties:
                          record_ids:
                            type: array
                            items:
                              type: string
                          deposits_saved:
                            type: integer
                          payments:
                            type: array
                            items:
                              $ref: '#/components/schemas/Bill'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/bill:
    post:
      tags:
        - Payment
      summary: Get / list bills (invoices, receipts, refunds)
      operationId: api.bill
      description: |
        Fetch bills (invoices `inv`, payment receipts `rec`, refunds `ref`)
        for one or more accounts. Supports pagination and filtering on
        billing cycle, type, due date, and payment status.

        Backed by `Action_BillAction::execute()`. For schema-validated
        filtering, prefer `/billapi/bills/get`.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                aid:
                  type: string
                  description: |
                    Single AID or JSON array of AIDs. Required when `query`
                    is not supplied.
                query:
                  type: string
                  description: JSON-encoded Mongo filter.
                billrun_key:
                  type: string
                  description: Filter by billing cycle (YYYYMM).
                type:
                  type: string
                  enum:
                    - inv
                    - rec
                    - ref
                page:
                  type: integer
                  minimum: 0
                size:
                  type: integer
                  minimum: 1
                  maximum: 1000
                sort:
                  type: string
      responses:
        '200':
          description: List of bills
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Bill'
  /api/cards:
    post:
      tags:
        - Payment
      summary: Tokenize a payment card / start periodic payment
      operationId: api.cards
      description: |
        Initiate a payment-card tokenization flow with the configured
        payment gateway. Returns a redirect URL where the customer can
        enter card details on a hosted page; on success BillRun receives a
        tokenized identifier that can be used for subsequent recurring
