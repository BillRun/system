                          $ref: '#/components/schemas/Bill'
  /realtime:
    post:
      tags:
        - Realtime
      summary: Realtime charging event
      operationId: realtime.event
      description: |
        Realtime event endpoint used by network elements (PGW, MMSC, SBC,
        etc.) for online charging. The shape of the request body depends on
        the configured `file_type`, which selects the parser and the rating
        pipeline.

        A typical flow:

        1. **Session start (`record_type=start_request`)** - reserve units;
           BillRun returns a granted volume + transaction ID.
        2. **Session update (`record_type=update_request`)** - mid-session
           re-authorization (consume, request additional units).
        3. **Session release (`record_type=release_request`)** - settle the
           actual used volume and free any reservation.

        Implementation: `RealtimeController::execute()` delegates to the
        configured decoder (JSON / KV / Diameter-mapped). Returned codes
        come from `conf/realtime/return_codes.ini`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - file_type
                - request
              properties:
                file_type:
                  type: string
                  description: |
                    Realtime file-type key (configured under the BillRun
                    input processors). Determines the parser and the rating
                    rules to apply.
                  example: ggsn_event
                request:
                  type: object
                  description: |
                    Event payload. Fields are processor-specific; the
                    example below shows a generic data-session event.
                  additionalProperties: true
                  properties:
                    record_type:
                      type: string
                      enum:
                        - start_request
                        - update_request
                        - release_request
                        - final_request
                    session_id:
                      type: string
                    imsi:
                      type: string
                    msisdn:
                      type: string
                    charging_id:
                      type: string
                    usaget:
                      type: string
                      enum:
                        - call
                        - sms
                        - mms
                        - data
                        - flat
                    usagev:
                      type: number
                      description: Volume consumed in this event.
                    request_num:
                      type: integer
                    reserved_units:
                      type: number
                    apn:
                      type: string
                    rating_group:
                      type: integer
                    result_code:
                      type: integer
                    start_time:
                      type: string
                      format: date-time
                    end_time:
                      type: string
                      format: date-time
      responses:
        '200':
          description: Realtime decision
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 0
                      - 1
                  desc:
                    type: string
                  tx_id:
                    type: string
                    description: Transaction ID
                  line_stamp:
                    type: string
                  charging_decision:
                    type: object
                    properties:
                      granted_units:
                        type: number
                      validity_time:
                        type: integer
                        description: Seconds
                      quota_threshold:
                        type: number
                      result_code:
                        type: integer
                  balance:
                    type: object
                    additionalProperties: true
                  rating:
                    type: object
                    properties:
                      arate:
                        type: string
                      aprice:
                        type: number
                      usagev:
                        type: number
                      usaget:
                        type: string
                  line:
                    $ref: '#/components/schemas/Line'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
  /api/reports:
    get:
      tags:
        - Reports
      summary: List report definitions
      operationId: api.reports.list
      description: |
        Return the catalogue of saved report definitions visible to the
        authenticated user.
      parameters:
        - name: query
          in: query
          description: JSON-encoded filter (e.g. by `key` or by user).
          schema:
            type: string
        - name: page
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
      responses:
        '200':
          description: Report definitions
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: array
                        items:
                          $ref: '#/components/schemas/Report'
  /api/report:
    post:
      tags:
        - Reports
      summary: Run a report
      operationId: api.report.run
      description: |
        Execute a saved report (by `key` or `_id`) or an ad-hoc one passed
        inline via the `report` field. Returns either the rendered rows
        directly (small results) or a file URL for large ones.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                key:
                  type: string
                  description: Report key to run (omit if passing `report` inline).
                _id:
                  type: string
                  description: Report Mongo ObjectId.
                report:
                  type: string
                  description: JSON-encoded inline report definition.
                format:
                  type: string
                  enum:
                    - json
                    - csv
                    - xlsx
                  default: json
                params:
                  type: string
                  description: JSON-encoded runtime parameters (date ranges, filters, etc).
                page:
                  type: integer
                  minimum: 0
                size:
                  type: integer
                  minimum: 1
      responses:
        '200':
          description: Report result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: object
                        properties:
                          columns:
                            type: array
                            items:
                              type: object
                              properties:
                                key:
                                  type: string
                                label:
                                  type: string
                                type:
                                  type: string
                          rows:
                            type: array
                            items:
                              type: object
                              additionalProperties: true
                          total:
                            type: integer
                          file_url:
                            type: string
                            format: uri
                            description: Set for `csv`/`xlsx` formats.
  /crm/billable:
    post:
      tags:
        - Outgoing
      summary: '[CRM] GBA - Get Billable Accounts'
      operationId: outgoing.gba
      description: |
        Called by BillRun's cycle aggregator at cycle-close time to fetch
        every account (with embedded subscriber revisions) that should be
        billed in the requested window. The CRM must return the data
        **paginated** - BillRun calls this repeatedly with increasing
        `page` until the response runs out of rows.

        Source: `Billrun_Account_External::getBillable()`.

        Request fields:

        - `start_date` / `end_date` - cycle window. Formatted per the
          `subscribers.billable.single_day_cycle_format` config (default
          `Y-m-d`, or `Y-m-d H:i:s` for same-day cycles).
        - `page` / `size` - pagination.
        - `aids` - optional comma-separated AID filter, used when BillRun
          is rebilling a subset.
        - `invoicing_days` - optional invoicing-day filter for tenants
          that split the cycle across multiple invoicing days.

        Response must include a truthy `status` and a `data` array;
        BillRun translates `firstname`->`first_name` and
        `lastname`->`last_name` automatically on the way in.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - start_date
                - end_date
                - page
                - size
              properties:
                start_date:
                  type: string
                  description: Cycle start (formatted per config).
                  example: '2026-05-01'
                end_date:
                  type: string
                  description: Cycle end (formatted per config).
                  example: '2026-06-01'
                page:
                  type: integer
                  minimum: 0
                  description: 0-based page index.
                size:
                  type: integer
                  minimum: 1
                  maximum: 1000
                  description: Page size.
                aids:
                  type: string
                  description: Optional comma-separated list of AIDs to restrict to.
                  example: 1001,1002,1003
                invoicing_days:
                  type: string
                  description: Optional invoicing-day filter.
      responses:
        '200':
          description: Paginated billable accounts + their subscriber revisions.
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - data
                properties:
                  status:
                    description: |
                      Truthy on success. BillRun treats `0`/empty as a
                      fatal error and aborts the cycle.
                    oneOf:
                      - type: integer
                      - type: boolean
                  desc:
                    type: string
                  data:
                    type: array
                    description: |
                      Mixed list of account and subscriber revisions for
                      the window. Each item carries a `type` field
                      (`account` or `subscriber`) so BillRun can route it.
                    items:
                      oneOf:
                        - $ref: '#/components/schemas/Account'
                        - $ref: '#/components/schemas/Subscriber'
                  total:
                    type: integer
                  has_more:
                    type: boolean
        4XX:
          description: Client error - BillRun treats this as a hard failure.
  /crm/account:
    post:
      tags:
        - Outgoing
      summary: '[CRM] GAD - Get Account Details'
      operationId: outgoing.gad
      description: |
        Fetch one or more account revisions by query. Used during rating
        and on ad-hoc lookups. The CRM receives a JSON envelope with a
        `query` array - each entry describes a set of `params` to match
        and the effective `time` for the lookup.

        Source: `Billrun_Account_External::getAccountDetails()` /
        `getAccountsDetails()`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - params
                    properties:
                      id:
                        type: string
                        description: Stable hash of the params for caching / de-duplication.
                      time:
                        type: string
                        description: |
                          Effective-time of the revision (formatted per
                          `subscribers.account.external.time_format`,
                          default `Y-m-d H:i:s.u`).
                      params:
                        type: array
                        description: AND-ed filter parameters.
                        items:
                          type: object
                          required:
                            - key
                            - operator
                            - value
                          properties:
                            key:
                              type: string
                              example: aid
                            operator:
                              type: string
                              enum:
                                - equal
                                - not_equal
                                - gt
                                - gte
                                - lt
                                - lte
                                - in
                                - not_in
                              example: equal
                            value:
                              description: Value to compare. Type depends on the field.
                              oneOf:
                                - type: string
                                - type: integer
                                - type: number
                                - type: boolean
                                - type: array
                limit:
                  type: integer
                  description: Optional global limit across all sub-queries.
                date:
                  type: string
                  description: Optional global effective-date.
      responses:
        '200':
          description: Array of account revisions (one per matching query).
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Account'
        4XX:
          description: Client error.
  /crm/subscriber:
    post:
      tags:
        - Outgoing
      summary: '[CRM] GSD - Get Subscriber Details'
      operationId: outgoing.gsd
      description: |
        Fetch one or more subscriber revisions by query. Same envelope
        shape as GAD - a `query` array of `{id, time, params}` entries.

        Source: `Billrun_Subscriber_External::getSubscriberDetails()`.

        When `subscribers.account.cache_gba_to_gsd.enabled` is on, BillRun
        pre-populates the local GSD cache from the previous GBA response
        so the cycle close does not hammer this endpoint for every line
        it rates.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required:
                - query
              properties:
                query:
                  type: array
                  items:
                    type: object
                    required:
                      - id
                      - params
                    properties:
                      id:
                        type: string
                      time:
                        type: string
                        description: Effective-time of the revision.
                      params:
                        type: array
                        items:
                          type: object
                          required:
                            - key
                            - operator
                            - value
                          properties:
                            key:
                              type: string
                              example: sid
                            operator:
                              type: string
                              enum:
                                - equal
                                - not_equal
                                - gt
                                - gte
                                - lt
                                - lte
                                - in
                                - not_in
                            value:
                              oneOf:
                                - type: string
                                - type: integer
                                - type: number
                                - type: boolean
                                - type: array
                limit:
                  type: integer
                date:
                  type: string
      responses:
        '200':
          description: Array of subscriber revisions.
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Subscriber'
        4XX:
          description: Client error.
  /api:
    get:
      tags:
        - BillAPI
      summary: Health check
      description: Heartbeat. Verifies the DB is reachable.
      security: []
      parameters:
        - name: simple
          in: query
          schema:
            type: boolean
          description: When true, returns a plain `SUCCESS`/`FAILED` string instead of JSON.
      responses:
        '200':
          description: Service status
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    enum:
                      - 0
                      - 1
                  message:
                    type: string
                    example: BillRun API Success
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: PHPSESSID
      description: |
        Obtained by calling `POST /auth/login` with a valid username/password
        (or other configured protocol such as LDAP/SAML). The session cookie is
        set automatically by the server and must be sent on every subsequent
        request.
    oauth2:
      type: oauth2
      description: |
        OAuth2 client credentials grant. Issued by `POST /oauth2/token`.
        Pass the returned access token in the `Authorization: Bearer <token>`
        header on every subsequent request.
      flows:
        clientCredentials:
          tokenUrl: /oauth2/token
          scopes:
            read: Read-only access
            write: Read + write access (modify entities)
            admin: Admin-level access (configuration, users, system actions)
    secretSignature:
      type: apiKey
      in: query
      name: signature
      description: |
        HMAC-style signature computed from the request parameters and a
        pre-shared secret (configured in BillRun under
        `Settings -> Security -> Shared Secret`).

        The same value can be passed in the request body for POST requests.
        Validated by `Billrun_Utils_Security::validateData`. Used for
        machine-to-machine integrations that do not maintain a session cookie
        or OAuth2 token.
  parameters:
    Collection:
      name: collection
      in: path
      required: true
      description: |
        The entity collection to operate on. One of the supported BillRun
        collections.
      schema:
        type: string
        enum:
          - accounts
          - subscribers
          - plans
          - services
          - rates
          - balances
          - bills
          - charges
          - discounts
          - prepaidincludes
          - prepaidgroups
          - taxes
          - reports
          - users
          - lines
          - autorenew
          - archive
          - audit
          - billrun
          - events
          - log
          - queue
          - suggestions
    Action:
      name: action
      in: path
      required: true
      description: |
        The action to perform on the collection. Not every collection supports
        every action - the BillAPI loads `conf/modules/billapi/<collection>.ini`
        at runtime and rejects unconfigured action/collection combinations.
      schema:
        type: string
        enum:
          - get
          - uniqueget
          - create
          - update
          - close
          - closeandnew
          - reopen
          - delete
          - move
          - permanentchange
          - import
          - export
          - changepassword
    Query:
      name: query
      in: query
      description: |
        JSON-encoded MongoDB-style filter. Fields available for filtering are
        declared per collection/action in the billapi ini config.
      schema:
        type: string
        example: '{"sid":12345}'
    Update:
      name: update
      in: query
      description: |
        JSON-encoded entity payload for create / update / close / closeandnew /
        permanentchange / move actions. Validated against the
        `update_parameters` list in the collection's ini config.
      schema:
        type: string
        example: '{"plan":"GOLD","from":"2026-01-01T00:00:00+00:00"}'
    Page:
      name: page
      in: query
      description: 0-based page index for paginated reads (`get` / `uniqueget`).
      schema:
        type: integer
        minimum: 0
        default: 0
    Size:
      name: size
      in: query
      description: Page size for paginated reads.
      schema:
        type: integer
        minimum: 1
        maximum: 1000
        default: 10
    Sort:
      name: sort
      in: query
      description: |
        JSON object mapping field name -> direction (`1` ascending, `-1`
        descending). Only fields explicitly allowed by the collection are
        accepted; `enable_sort=1` must be set on the action.
      schema:
        type: string
        example: '{"creation_time":-1}'
    Project:
      name: project
      in: query
      description: |
        JSON projection of fields to include (`1`) or exclude (`0`) from the
        response - MongoDB projection semantics.
      schema:
        type: string
        example: '{"firstname":1,"lastname":1,"sid":1}'
  responses:
    Envelope:
      description: Standard BillRun response envelope.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/EnvelopeSchema'
    BadRequest:
      description: Invalid or missing parameters.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
    Unauthorized:
      description: Missing or invalid authentication.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
    Forbidden:
      description: Authenticated but lacks permission for this action.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
    NotFound:
      description: Entity not found.
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorSchema'
  schemas:
    Envelope:
      $ref: '#/components/schemas/EnvelopeSchema'
    Error:
      $ref: '#/components/schemas/ErrorSchema'
    Account:
      type: object
      description: |
        Customer account. Stored in the `subscribers` collection with
        `type=account`. Identified by the auto-incrementing `aid` field.
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            type:
              type: string
              enum:
                - account
              default: account
            aid:
              type: integer
              description: Account ID
            account_import_id:
              type: string
            firstname:
              type: string
            lastname:
              type: string
            company_name:
              type: string
            contact_name:
              type: string
            email:
              type: string
              format: email
            phone:
              type: string
            street:
              type: string
            city:
              type: string
            country:
              type: string
            zip:
              type: string
            vat_number:
              type: string
            invoice_language:
              type: string
              example: en
            services:
              type: array
              items:
                $ref: '#/components/schemas/Discount'
            overrides:
              type: object
              additionalProperties: true
            payment_gateway:
              type: object
              additionalProperties: true
            tenant_return_url:
              type: string
              format: uri
      additionalProperties: true
    Subscriber:
      type: object
      description: |
        Subscriber (end customer). Stored in the `subscribers` collection
        with `type=subscriber`. Identified by `sid` (auto-incrementing) and
        linked to an account via `aid`.
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            type:
              type: string
              enum:
                - subscriber
              default: subscriber
            sid:
              type: integer
              description: Subscriber ID
            aid:
              type: integer
              description: Parent account ID
            firstname:
              type: string
            lastname:
              type: string
            plan:
              type: string
              description: Plan name (matches `/billapi/plans` `name`)
            play:
              type: string
              description: Play (vertical, e.g. mobile/fixed/data)
            plan_activation:
              type: string
              format: date-time
            services:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  service_id:
                    type: string
                  quantity:
                    type: integer
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
            discounts:
              type: array
              items:
                type: object
                properties:
                  key:
                    type: string
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
            overrides:
              type: object
              additionalProperties: true
      additionalProperties: true
    Plan:
      type: object
      description: |
        Billing plan. Defines the recurring charges, inclusive units, and
        rate overrides bundled together as a sellable package.
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            name:
              type: string
              description: Plan identifier (must match `/^[A-Z0-9_]+$/`).
              example: GOLD
            description:
              type: string
            price:
              type: array
              description: |
                Tiered price points (per cycle / per period). Each entry has
                its own `from`/`to`, `price`, and optional `proration` flag.
              items:
                type: object
                properties:
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  price:
                    type: number
                  proration:
                    type: boolean
            recurrence:
              type: array
              description: Recurrence rules (cycle, period).
              items:
                type: object
                properties:
                  cycle:
                    type: integer
                  period:
                    type: string
                    enum:
                      - day
                      - week
                      - month
                      - year
                  unit:
                    type: integer
            upfront:
              type: boolean
              description: Charge upfront (vs. in arrears).
            connection_type:
              type: string
              enum:
                - prepaid
                - postpaid
            notifications_threshold:
              type: array
              items:
                type: object
                additionalProperties: true
            disallowed_rates:
              type: array
              items:
                type: string
            pp_threshold:
              type: array
              items:
                type: object
                additionalProperties: true
            include:
              type: array
              items:
                type: object
                properties:
                  name:
                    type: string
                  quantity:
                    type: number
                  unit:
                    type: string
            rates:
              type: array
              items:
                type: string
            play:
              type: array
              items:
                type: string
            tax:
              type: array
              items:
                type: string
            prorated_start:
              type: boolean
            prorated_end:
              type: boolean
            prorated_termination:
              type: boolean
            rounding_rules:
              type: array
              items:
                type: object
                additionalProperties: true
            operation:
              type: string
            charging_type:
              type: string
              enum:
                - postpaid
                - prepaid
              deprecated: true
            type:
              type: string
              deprecated: true
      additionalProperties: true
    Service:
      type: object
      description: |
        Service bundle attachable to a subscriber or account (e.g. an
        add-on, an extra data pack, a one-time activation fee).
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            name:
              type: string
            description:
              type: string
            price:
              type: array
              items:
                type: object
                properties:
                  from:
                    type: string
                    format: date-time
                  to:
                    type: string
                    format: date-time
                  price:
                    type: number
                  proration:
                    type: boolean
            quantitative:
              type: boolean
              description: Allows multiple quantities per subscriber.
            balance_period:
              type: string
              description: Validity period of attached balances (`1M`, `30D`, ...).
            include:
              type: array
              items:
                type: object
                additionalProperties: true
            play:
              type: array
              items:
                type: string
            tax:
              type: array
              items:
                type: string
            prorated_start:
              type: boolean
            prorated_end:
              type: boolean
            prorated_termination:
              type: boolean
            params:
              type: object
              additionalProperties: true
      additionalProperties: true
    Rate:
      type: object
      description: |
        Rate definition (called "Product" in the UI). Describes how a unit of
        usage is priced. Identified by `key`.
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            key:
              type: string
              description: Rate identifier (must match `/^[A-Z0-9_]+$/`).
              example: CALL_INTL
            description:
              type: string
            invoice_label:
              type: string
            pricing_method:
              type: string
              enum:
                - tiered
                - flat
                - customRate
            tariff_category:
              type: string
              description: e.g. `retail`, `wholesale`.
            add_to_retail:
              type: boolean
            play:
              type: string
            rates:
              type: object
              description: |
                Per-usaget pricing tables. Keys are usage types
                (`call`, `sms`, `data`, ...); values are arrays of price
                tiers.
              additionalProperties:
                type: object
                properties:
                  rate:
                    type: array
                    items:
                      type: object
                      properties:
                        from:
                          type: number
                        to:
                          type: number
                        interval:
                          type: number
                        price:
                          type: number
                        ceil:
                          type: boolean
                  category:
                    type: string
                  access:
                    type: number
            params:
              type: object
              additionalProperties: true
            tax:
              type: array
              items:
                type: string
            rounding_rules:
              type: array
              items:
                type: object
                additionalProperties: true
      additionalProperties: true
    Balance:
      type: object
      description: |
        Per-subscriber balance bucket for a given billing cycle. Tracks
        inclusive units used and over-usage charges.
      properties:
        _id:
          type: string
        sid:
          type: integer
        aid:
          type: integer
        plan:
          type: string
        billrun_month:
          type: string
          description: Billing cycle key (YYYYMM).
        period:
          type: string
          enum:
            - default
            - custom
        from:
          type: string
          format: date-time
        to:
          type: string
          format: date-time
        balance:
          type: object
          description: Per-usage-type totals (currency + units).
          additionalProperties:
            type: object
            properties:
              cost:
                type: number
              usagev:
                type: number
              count:
                type: integer
        totals:
          type: object
          additionalProperties: true
        pp_includes_external_ids:
          type: array
          items:
            type: string
        pp_includes_name:
          type: array
          items:
            type: string
        priority:
          type: integer
        creation_time:
          type: string
          format: date-time
        notifications:
          type: array
          items:
            type: object
            additionalProperties: true
      additionalProperties: true
    Bill:
      type: object
      description: |
        Bill document - covers invoices (`type=inv`), payment receipts
        (`type=rec`), and refunds (`type=ref`). Stored in the `bills`
        collection.
      properties:
        _id:
          type: string
        type:
          type: string
          enum:
            - inv
            - rec
            - ref
        aid:
          type: integer
        invoice_id:
          type: integer
          description: Invoice number (type=inv only)
        txid:
          type: string
          description: Transaction ID (type=rec/ref)
        billrun_key:
          type: string
          description: Billing cycle (YYYYMM).
        method:
          type: string
          description: Payment method (`credit`, `cash`, `cheque`, `direct_debit`, ...).
        amount:
          type: number
          description: Gross amount
        total:
          type: number
          description: Total after tax / discounts
        paid:
          type: boolean
          description: Whether the bill has been fully paid.
        paid_amount:
          type: number
        due:
          type: string
          format: date-time
        due_date:
          type: string
          format: date-time
        paid_date:
          type: string
          format: date-time
        issue_date:
          type: string
          format: date-time
        urt:
          type: string
          format: date-time
          description: Unified record time.
        currency:
          type: string
        invoice_file:
          type: string
          description: Path to the generated PDF, if any.
        payment_gateway:
          type: object
          additionalProperties: true
        left_to_pay:
          type: number
        pays:
          type: array
          description: For receipts, the invoice(s) being paid.
          items:
            type: object
            properties:
              inv:
                type: integer
              amount:
                type: number
        left:
          type: object
          additionalProperties: true
        cancel:
          type: object
          description: Cancellation metadata.
          additionalProperties: true
        creation_time:
          type: string
          format: date-time
      additionalProperties: true
    Line:
      type: object
      description: |
        Usage line / CDR. The atomic unit of billable activity in BillRun -
        every call, SMS, data session, credit, recurring charge, etc.
        becomes a row in the `lines` collection.
      properties:
        _id:
          type: string
        stamp:
          type: string
          description: Unique record ID (typically a hash of the source fields).
        type:
          type: string
          description: |
            Line origin. Common values: `nsn`, `tap3`, `cdr`, `flat`,
            `credit`, `service`, `discount`, `automatic_payment`.
        usaget:
          type: string
          description: Usage type. e.g. `call`, `sms`, `mms`, `data`, `flat`.
        usagev:
          type: number
          description: Usage volume in the unit of `usaget`
        aprice:
          type: number
          description: Charge amount before tax
        final_charge:
          type: number
          description: Charge amount after tax
        aid:
          type: integer
        sid:
          type: integer
        plan:
          type: string
        arate:
          type: string
          description: Reference to the rate document (Mongo DBRef).
        arate_key:
          type: string
          description: Rate key (denormalized)
        arategroup:
          type: string
        in_group:
          type: number
          description: Volume covered by inclusive units
        over_group:
          type: number
        billrun:
          type: string
          description: Billing cycle (YYYYMM).
        urt:
          type: string
          format: date-time
          description: Unified record time - the rating timestamp.
        process_time:
          type: string
          format: date-time
        src:
          type: string
          description: Calling ID / source
        dst:
          type: string
          description: Destination
        channel:
          type: string
        charging_type:
          type: string
          enum:
            - postpaid
            - prepaid
        tax_data:
          type: object
          additionalProperties: true
        log_stamp:
          type: string
        file:
          type: string
      additionalProperties: true
    Discount:
      type: object
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            key:
              type: string
              description: Stable identifier
            description:
              type: string
            type:
              type: string
              enum:
                - monetary
                - percentage
                - units
            value:
              type: number
            priority:
              type: integer
            plan:
              type: array
              items:
                type: string
            services:
              type: array
              items:
                type: string
            rates:
              type: array
              items:
                type: string
            subject:
              type: object
              additionalProperties: true
              description: Mongo-style selector for entities the discount applies to.
            conditions:
              type: array
              items:
                type: object
                additionalProperties: true
            play:
              type: array
              items:
                type: string
            params:
              type: object
              additionalProperties: true
            tax:
              type: array
              items:
                type: string
    Charge:
      type: object
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            key:
              type: string
            description:
              type: string
            type:
              type: string
              enum:
                - recurring
                - one_time
                - late_fee
            price:
              type: number
            currency:
              type: string
            cycles:
              type: integer
              description: Number of cycles to apply (recurring only)
            tax:
              type: array
              items:
                type: string
            params:
              type: object
              additionalProperties: true
    Tax:
      type: object
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            key:
              type: string
            description:
              type: string
            rate:
              type: number
              description: Tax rate as a fraction (0.17 = 17%).
            type:
              type: string
              enum:
                - vat
                - gst
                - sales
            country:
              type: string
            region:
              type: string
            compound:
              type: boolean
    PrepaidInclude:
      type: object
      allOf:
        - $ref: '#/components/schemas/Revision'
        - type: object
          properties:
            external_id:
              type: string
            name:
              type: string
            description:
              type: string
            charging_by:
              type: string
              enum:
                - total_cost
                - usagev
                - cost
            charging_by_usaget:
              type: string
              description: Usage type (call, sms, data, ...) for usage-based balances.
            priority:
              type: integer
            operation:
              type: string
              enum:
                - inc
                - dec
                - abs
            notifications_threshold:
              type: array
              items:
                type: object
                additionalProperties: true
            shared:
              type: boolean
            group:
              type: string
            recurrence:
              type: object
              additionalProperties: true
    User:
      type: object
      description: |
        Operator/admin user (the kind that logs in to BillRun's back office).
        Subscribers are *not* stored here - see the `subscribers` collection.
      properties:
        _id:
          type: string
        username:
          type: string
        email:
          type: string
          format: email
        roles:
          type: array
          items:
            type: string
        permissions:
          type: array
          items:
            type: string
        last_login:
          type: string
          format: date-time
        created:
          type: string
          format: date-time
        enabled:
          type: boolean
        settings:
          type: object
          additionalProperties: true
    Report:
      type: object
      description: Saved report definition (run via `POST /api/report`).
      properties:
        _id:
          type: string
        key:
          type: string
        name:
          type: string
        description:
          type: string
        entity:
          type: string
          description: Source collection (`lines`, `bills`, `subscribers`, ...).
        columns:
          type: array
          items:
            type: object
            properties:
              key:
                type: string
              label:
                type: string
              type:
                type: string
                enum:
                  - string
                  - number
                  - date
                  - currency
              op:
                type: string
                description: Aggregation operator (`sum`, `avg`, ...).
        conditions:
          type: array
          items:
            type: object
            additionalProperties: true
        sort:
          type: object
          additionalProperties:
            type: integer
            enum:
              - -1
              - 1
        creation_time:
          type: string
          format: date-time
        last_run:
          type: string
          format: date-time
        shared:
          type: boolean
    Revision:
      type: object
      description: |
        Common revision-tracking fields. All time-bound entities in BillRun
        (accounts, subscribers, plans, services, rates, ...) carry these and
        follow a "close current revision + create new revision" pattern for
        historical changes.
      properties:
        _id:
          type: string
          description: Mongo ObjectId of this revision.
        from:
          type: string
          format: date-time
          description: Effective-from boundary of this revision.
        to:
          type: string
          format: date-time
          description: |
            Effective-to boundary. Open revisions use the sentinel
            `2099-01-01` (configurable).
        creation_time:
          type: string
          format: date-time
        revision_info:
          type: object
          description: Optional metadata about prior/next revisions.
          additionalProperties: true
    ErrorSchema:
      type: object
      properties:
        status:
          type: integer
          enum:
            - 0
        desc:
          type: string
        error:
          type: object
          properties:
            code:
              type: integer
            message:
              type: string
            context:
              type: object
              additionalProperties: true
    EnvelopeSchema:
      type: object
      description: |
        Common response envelope. Almost every BillRun endpoint wraps its
        result in this shape.
      properties:
        status:
          type: integer
          description: |
            `1` on success, `0` on hard failure, `2` on partial success (some
            items in a batch succeeded).
          enum:
            - 0
            - 1
            - 2
        desc:
          type: string
          description: Human-readable description (`"success"` on success).
        details:
          description: Action-specific payload.
          type:
            - object
            - array
            - string
            - 'null'
        entity:
          type: object
          description: The affected entity after the operation, when applicable.
          additionalProperties: true
        input:
          type: object
          description: Echo of the request input (for debugging / audit).
          additionalProperties: true
      required:
        - status
