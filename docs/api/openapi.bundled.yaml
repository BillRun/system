                  type: string
                  format: uri
                fail_redirect:
                  type: string
                  format: uri
                return_url:
                  type: string
                  format: uri
                tenant_url:
                  type: string
                action:
                  type: string
                  enum:
                    - start_periodic_payment
                    - retrieve_token
                    - delete_token
      responses:
        '200':
          description: Tokenization result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/EnvelopeSchema'
                  - type: object
                    properties:
                      details:
                        type: object
                        properties:
                          url:
                            type: string
                            format: uri
                            description: Hosted-payment-page URL
                          gateway:
                            type: string
                          request_id:
                            type: string
  /api/adjustpayments:
    post:
      tags:
        - Payment
      summary: Adjust / reconcile payments
      operationId: api.adjustpayments
