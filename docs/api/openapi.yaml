    Plan:
      $ref: "components/schemas/plan.yaml#/Plan"
    Service:
      $ref: "components/schemas/service.yaml#/Service"
    Rate:
      $ref: "components/schemas/rate.yaml#/Rate"
    Balance:
      $ref: "components/schemas/balance.yaml#/Balance"
    Bill:
