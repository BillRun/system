reports:
  get:
    tags: [Reports]
    summary: List report definitions
    operationId: api.reports.list
    description: |
      Return the catalogue of saved report definitions visible to the
      authenticated user.
    parameters:
      - name: query
        in: query
        description: JSON-encoded filter (e.g. by `key` or by user).
        schema: { type: string }
      - name: page
        in: query
        schema: { type: integer, minimum: 0, default: 0 }
      - name: size
        in: query
        schema: { type: integer, minimum: 1, maximum: 500, default: 50 }
    responses:
      "200":
        description: Report definitions
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/responses.yaml#/EnvelopeSchema"
                - type: object
                  properties:
                    details:
                      type: array
                      items: { $ref: "../components/schemas/common.yaml#/Report" }

report:
  post:
    tags: [Reports]
    summary: Run a report
    operationId: api.report.run
    description: |
      Execute a saved report (by `key` or `_id`) or an ad-hoc one passed
      inline via the `report` field. Returns either the rendered rows
      directly (small results) or a file URL for large ones.
    requestBody:
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              key:
                type: string
                description: Report key to run (omit if passing `report` inline).
              _id:
                type: string
                description: Report Mongo ObjectId.
              report:
                type: string
                description: JSON-encoded inline report definition.
              format:
                type: string
                enum: [json, csv, xlsx]
                default: json
              params:
                type: string
                description: JSON-encoded runtime parameters (date ranges, filters, etc).
              page: { type: integer, minimum: 0 }
              size: { type: integer, minimum: 1 }
    responses:
      "200":
        description: Report result
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/responses.yaml#/EnvelopeSchema"
                - type: object
                  properties:
                    details:
                      type: object
                      properties:
                        columns:
                          type: array
                          items:
                            type: object
                            properties:
                              key:   { type: string }
                              label: { type: string }
                              type:  { type: string }
                        rows:
                          type: array
                          items:
                            type: object
                            additionalProperties: true
                        total: { type: integer }
                        file_url: { type: string, format: uri, description: "Set for `csv`/`xlsx` formats." }
