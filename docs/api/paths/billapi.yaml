bills:
  post:
    tags: [BillAPI]
    summary: Bills collection
    operationId: billapi.bills
    description: |
      Bill documents - covers both invoices (`type=inv`) and payment
      receipts/refunds (`type=rec`, `type=ref`).

      Supported actions: `get`, `uniqueget`, `update`, `delete`.
    parameters:
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [get, uniqueget, update, delete]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: object
                properties:
                  _id:     { type: string }
                  aid:     { type: integer }
                  type:    { type: string, enum: [inv, rec, ref] }
                  invoice_id: { type: integer }
                  due:     { type: string, format: date-time }
                  billrun_key: { type: string }
                additionalProperties: true
              update:
                type: object
                additionalProperties: true
    responses:
      "200":
        description: Bills result
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/responses.yaml#/EnvelopeSchema"
                - type: object
                  properties:
                    details:
                      type: array
                      items: { $ref: "../components/schemas/bill.yaml#/Bill" }

