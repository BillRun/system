# ---------------------------------------------------------------------------
# BillAPI: /billapi/{collection}/{action}
# ---------------------------------------------------------------------------
# Every entity in BillRun (accounts, subscribers, plans, services, rates, ...)
# is exposed through the same routing pattern. The set of supported actions
# and the parameter list per action is declared in
# conf/modules/billapi/<collection>.ini.
#
# Common actions:
#   - get / uniqueget : read (paginated, sortable)
#   - create          : insert a new entity
#   - update          : modify in place
#   - close           : set the entity's `to` revision boundary
#   - closeandnew     : close current revision + create a new one (typical
#                       way to record a change with effective-date semantics)
#   - reopen          : reopen a previously closed revision
#   - delete          : delete (by `_id`)
#   - move            : shift the `from`/`to` of a revision
#   - permanentchange : change the entity going forward (cuts an older
#                       revision and applies the update from `from` onwards)
#   - import          : bulk create from an upload
#   - export          : stream rows out
#   - changepassword  : users only
# ---------------------------------------------------------------------------

generic:
  post:
    tags: [BillAPI]
    summary: Generic entity API
    operationId: billapi.generic
    description: |
      Generic shape of every BillAPI endpoint. See the per-collection paths
      below for the parameter list applicable to a given collection/action
      combination.

      ### Request shape

      Parameters can be sent either as `application/x-www-form-urlencoded`
      or `application/json`. The two most common are:

      - `query` - a JSON-encoded MongoDB-style filter, used by read actions
        (`get`, `uniqueget`) and by mutating actions that target a specific
        revision (`update`, `close`, `closeandnew`, `delete`, ...).
      - `update` - a JSON-encoded entity payload, used by all mutating
        actions.

      ### Response shape

      All responses use the standard envelope - see
      [Envelope](#components/schemas/Envelope).
    parameters:
      - $ref: "../components/parameters.yaml#/Collection"
      - $ref: "../components/parameters.yaml#/Action"
      - $ref: "../components/parameters.yaml#/Query"
      - $ref: "../components/parameters.yaml#/Update"
      - $ref: "../components/parameters.yaml#/Page"
      - $ref: "../components/parameters.yaml#/Size"
      - $ref: "../components/parameters.yaml#/Sort"
      - $ref: "../components/parameters.yaml#/Project"
    requestBody:
      content:
        application/x-www-form-urlencoded:
          schema:
            type: object
            properties:
              query:  { type: string, description: "JSON-encoded filter" }
              update: { type: string, description: "JSON-encoded entity payload" }
        application/json:
          schema:
            type: object
            additionalProperties: true
    responses:
      "200":
        $ref: "../components/responses.yaml#/Envelope"
      "400": { $ref: "../components/responses.yaml#/BadRequest" }
      "401": { $ref: "../components/responses.yaml#/Unauthorized" }
      "403": { $ref: "../components/responses.yaml#/Forbidden" }
      "404": { $ref: "../components/responses.yaml#/NotFound" }

# ---------------------------------------------------------------------------
# Accounts (collection_name = subscribers, type = account)
# ---------------------------------------------------------------------------
accounts:
  post:
    tags: [BillAPI]
    summary: Accounts collection
    operationId: billapi.accounts
    description: |
      Customer accounts. Backed by the `subscribers` MongoDB collection
      with `type=account`.

      Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
      `closeandnew`, `reopen`, `delete`, `permanentchange`, `import`.
    parameters:
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [get, uniqueget, create, update, close, closeandnew, reopen, delete, permanentchange, import]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: object
                description: Filter for reads / targeted writes.
                properties:
                  _id:           { type: string, description: "Mongo ObjectId" }
                  aid:           { type: integer, description: "Account ID" }
                  firstname:     { type: string }
                  lastname:      { type: string }
                  company_name:  { type: string }
                  contact_name:  { type: string }
                  phone:         { type: string }
                  creation_time: { type: string, format: date-time }
                additionalProperties: true
              update:
                $ref: "../components/schemas/account.yaml#/AccountUpdate"
    responses:
      "200":
        description: Accounts result
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/responses.yaml#/EnvelopeSchema"
                - type: object
                  properties:
                    details:
                      oneOf:
                        - type: array
                          items: { $ref: "../components/schemas/account.yaml#/Account" }
                        - type: object
                          additionalProperties: true
      "400": { $ref: "../components/responses.yaml#/BadRequest" }
      "401": { $ref: "../components/responses.yaml#/Unauthorized" }
      "403": { $ref: "../components/responses.yaml#/Forbidden" }

# ---------------------------------------------------------------------------
# Subscribers
# ---------------------------------------------------------------------------
subscribers:
  post:
    tags: [BillAPI]
    summary: Subscribers collection
    operationId: billapi.subscribers
    description: |
      Subscribers belong to an account (linked by `aid`). Identified by
      `sid` (auto-incremented).

      Supported actions: `get`, `uniqueget`, `create`, `update`, `close`,
      `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`,
      `import`.
    parameters:
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [get, uniqueget, create, update, close, closeandnew, reopen, delete, move, permanentchange, import]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: object
                properties:
                  _id:  { type: string }
                  sid:  { type: integer }
                  aid:  { type: integer }
                  "services.from": { type: string, format: date-time }
                  "services.to":   { type: string, format: date-time }
                  "services.name": { type: array, items: { type: string } }
                  creation_time:   { type: string, format: date-time }
                additionalProperties: true
              update:
                $ref: "../components/schemas/subscriber.yaml#/SubscriberUpdate"
    responses:
      "200":
        description: Subscribers result
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/responses.yaml#/EnvelopeSchema"
                - type: object
                  properties:
                    details:
                      oneOf:
                        - type: array
                          items: { $ref: "../components/schemas/subscriber.yaml#/Subscriber" }
                        - type: object
                          additionalProperties: true

