      `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`.
    parameters:
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [get, uniqueget, create, update, close, closeandnew, reopen, delete, move, permanentchange]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: object
                properties:
                  _id:  { type: string }
                  name: { type: string }
                  to:   { type: string, format: date-time }
