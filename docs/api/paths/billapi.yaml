      `closeandnew`, `reopen`, `delete`, `move`, `permanentchange`.
    parameters:
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [get, uniqueget, create, update, close, closeandnew, reopen, delete, move, permanentchange]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: object
                properties:
                  _id: { type: string }
                  key: { type: string }
                additionalProperties: true
              update:
                $ref: "../components/schemas/rate.yaml#/RateUpdate"
