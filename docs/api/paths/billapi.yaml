                      items: { $ref: "../components/schemas/rate.yaml#/Rate" }

# ---------------------------------------------------------------------------
# Balances
# ---------------------------------------------------------------------------
balances:
  post:
    tags: [BillAPI]
    summary: Balances collection
    operationId: billapi.balances
    description: |
      Monthly / cycle balance buckets per subscriber. Tracks inclusive
      units consumed and over-usage charges.

      Supported actions: `get`, `uniqueget`, `update`, `delete`.
    parameters:
      - name: action
        in: path
        required: true
        schema:
          type: string
          enum: [get, uniqueget, update, delete]
    requestBody:
      content:
        application/json:
          schema:
            type: object
            properties:
              query:
                type: object
                properties:
                  _id:     { type: string }
                  sid:     { type: integer }
                  aid:     { type: integer }
                  billrun: { type: string, description: "Billing cycle key (YYYYMM)" }
                additionalProperties: true
              update:
                type: object
                additionalProperties: true
    responses:
      "200":
        description: Balances result
        content:
          application/json:
            schema:
              allOf:
                - $ref: "../components/responses.yaml#/EnvelopeSchema"
                - type: object
                  properties:
                    details:
                      type: array
                      items: { $ref: "../components/schemas/balance.yaml#/Balance" }

