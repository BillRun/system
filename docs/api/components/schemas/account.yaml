Account:
  type: object
  description: |
    Customer account. Stored in the `subscribers` collection with
    `type=account`. Identified by the auto-incrementing `aid` field.
  allOf:
    - $ref: "common.yaml#/Revision"
    - type: object
      properties:
        type:
          type: string
          enum: [account]
          default: account
        aid:                { type: integer, description: "Account ID" }
        account_import_id:  { type: string }
        firstname:          { type: string }
        lastname:           { type: string }
        company_name:       { type: string }
        contact_name:       { type: string }
        email:              { type: string, format: email }
        phone:              { type: string }
        street:             { type: string }
        city:               { type: string }
        country:            { type: string }
        zip:                { type: string }
        vat_number:         { type: string }
        invoice_language:   { type: string, example: en }
        services:
          type: array
          items: { $ref: "common.yaml#/Discount" }
        overrides:
          type: object
          additionalProperties: true
        payment_gateway:
          type: object
          additionalProperties: true
        tenant_return_url:  { type: string, format: uri }
  additionalProperties: true

AccountUpdate:
  type: object
  description: |
    Payload accepted by `create`/`update`/`closeandnew`/`permanentchange`
    on `/billapi/accounts`. Mandatory parameters are enforced for the
    `create` action only.
  properties:
    from: { type: string, format: date-time }
    to:   { type: string, format: date-time }
    aid:
      type: integer
      description: Auto-generated on `create`; required to identify on `update`.
    account_import_id: { type: string }
    invoice_language:  { type: string }
    services:
      type: array
      items:
        type: object
        properties:
          name: { type: string }
          from: { type: string, format: date-time }
          to:   { type: string, format: date-time }
    overrides:
      type: object
      additionalProperties: true
  additionalProperties: true
